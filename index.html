<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Hotel Management System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:450px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(12px);
    padding:30px;
    border-radius:20px;
    box-shadow:0 8px 32px rgba(0,0,0,0.4);
    color:white;
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(-20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.container h1{
    text-align:center;
    margin-bottom:25px;
    font-size:30px;
}

.input-box{
    margin-bottom:18px;
}

.input-box label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
}

.input-box input,
.input-box select{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    outline:none;
    font-size:15px;
    background:rgba(255,255,255,0.2);
    color:white;
}

.input-box input::placeholder{
    color:#ddd;
}

.input-box select option{
    color:black;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#00c853;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
    margin-top:10px;
}

button:hover{
    background:#00e676;
    transform:scale(1.03);
}

.clear-btn{
    background:#ff1744;
}

.clear-btn:hover{
    background:#ff4569;
}

.whatsapp-btn{
    background:#25D366;
}

.whatsapp-btn:hover{
    background:#34eb7a;
}

.bill{
    margin-top:25px;
    background:rgba(255,255,255,0.15);
    padding:20px;
    border-radius:15px;
    display:none;
    animation:slideUp 0.5s ease;
}

@keyframes slideUp{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.bill h2{
    text-align:center;
    margin-bottom:15px;
    color:#ffeb3b;
}

.bill p{
    margin:10px 0;
    font-size:17px;
}

.total{
    font-size:22px;
    color:#00ff95;
    font-weight:bold;
}

.history{
    margin-top:25px;
}

.history h2{
    text-align:center;
    margin-bottom:15px;
    color:#ffd54f;
}

.booking-card{
    background:rgba(255,255,255,0.12);
    padding:15px;
    border-radius:12px;
    margin-bottom:12px;
}

.booking-card p{
    margin:5px 0;
}

</style>
</head>

<body>

<div class="container">

    <h1>🏨 Hotel Management</h1>

    <div class="input-box">
        <label>Customer Name</label>
        <input type="text" id="name" placeholder="Enter your name">
    </div>

    <div class="input-box">
        <label>Mobile Number</label>
        <input type="number" id="mobile" placeholder="Enter mobile number">
    </div>

    <div class="input-box">
        <label>Room Type</label>
        <select id="room">
            <option value="1500">Standard Room - ₹1500</option>
            <option value="2500">Deluxe Room - ₹2500</option>
            <option value="4000">Luxury Suite - ₹4000</option>
        </select>
    </div>

    <div class="input-box">
        <label>Number of Days</label>
        <input type="number" id="days" placeholder="Enter number of days">
    </div>

    <div class="input-box">
        <label>Extra Services</label>
        <select id="service">
            <option value="0">No Extra Service - ₹0</option>
            <option value="500">Food Service - ₹500</option>
            <option value="800">Swimming Pool - ₹800</option>
            <option value="1200">Spa Service - ₹1200</option>
        </select>
    </div>

    <button onclick="generateBill()">Book Now</button>

    <button class="whatsapp-btn" onclick="sendWhatsApp()">
        Send WhatsApp Message
    </button>

    <button class="clear-btn" onclick="clearBookings()">
        Clear Saved Data
    </button>

    <div class="bill" id="bill">

        <h2>Booking Details</h2>

        <p id="customer"></p>
        <p id="mobileText"></p>
        <p id="roomtype"></p>
        <p id="serviceText"></p>
        <p id="stay"></p>
        <p id="date"></p>
        <p class="total" id="total"></p>

    </div>

    <div class="history">

        <h2>📜 Booking History</h2>

        <div id="historyList"></div>

    </div>

</div>

<script>

loadBookings();

function generateBill(){

    let name = document.getElementById("name").value;

    let mobile = document.getElementById("mobile").value;

    let room = document.getElementById("room");

    let roomName = room.options[room.selectedIndex].text;

    let roomPrice = parseInt(room.value);

    let service = document.getElementById("service");

    let serviceName = service.options[service.selectedIndex].text;

    let servicePrice = parseInt(service.value);

    let days = document.getElementById("days").value;

    if(name === "" || mobile === "" || days === ""){

        alert("Please fill all details");

        return;
    }

    let total = (roomPrice * days) + servicePrice;

    let currentDate = new Date().toLocaleString();

    document.getElementById("bill").style.display = "block";

    document.getElementById("customer").innerHTML =
    "👤 Customer Name: " + name;

    document.getElementById("mobileText").innerHTML =
    "📞 Mobile Number: " + mobile;

    document.getElementById("roomtype").innerHTML =
    "🛏️ Room Type: " + roomName;

    document.getElementById("serviceText").innerHTML =
    "🍽️ Extra Service: " + serviceName;

    document.getElementById("stay").innerHTML =
    "📅 Stay Days: " + days;

    document.getElementById("date").innerHTML =
    "⏰ Booking Time: " + currentDate;

    document.getElementById("total").innerHTML =
    "💰 Total Bill: ₹" + total;

    let booking = {

        name,
        mobile,
        roomName,
        serviceName,
        days,
        total,
        currentDate
    };

    let bookings =
    JSON.parse(localStorage.getItem("hotelBookings")) || [];

    bookings.push(booking);

    localStorage.setItem(
        "hotelBookings",
        JSON.stringify(bookings)
    );

    loadBookings();

    let bookingMessage = `
🏨 HOTEL BOOKING CONFIRMED

👤 Name: ${name}

📞 Mobile: ${mobile}

🛏️ Room: ${roomName}

🍽️ Service: ${serviceName}

📅 Days: ${days}

💰 Total Bill: ₹${total}

⏰ Date: ${currentDate}

Thank You For Booking ❤️
`;

    alert(bookingMessage);
}

function loadBookings(){

    let historyList =
    document.getElementById("historyList");

    let bookings =
    JSON.parse(localStorage.getItem("hotelBookings")) || [];

    historyList.innerHTML = "";

    bookings.forEach((data)=>{

        historyList.innerHTML += `

        <div class="booking-card">

            <p><b>👤 Name:</b> ${data.name}</p>

            <p><b>📞 Mobile:</b> ${data.mobile}</p>

            <p><b>🛏️ Room:</b> ${data.roomName}</p>

            <p><b>🍽️ Service:</b> ${data.serviceName}</p>

            <p><b>📅 Days:</b> ${data.days}</p>

            <p><b>💰 Total:</b> ₹${data.total}</p>

            <p><b>⏰ Date:</b> ${data.currentDate}</p>

        </div>

        `;
    });
}

function clearBookings(){

    localStorage.removeItem("hotelBookings");

    document.getElementById("historyList").innerHTML = "";

    alert("All booking history cleared!");
}

function sendWhatsApp(){

    let phone =
    document.getElementById("mobile").value;

    let name =
    document.getElementById("name").value;

    if(phone === ""){

        alert("Please enter mobile number");

        return;
    }

    let text = `🏨 HOTEL BOOKING CONFIRMED

👤 Customer: ${name}

✅ Your Room Booking Successful!

Thank You ❤️`;

    let url =
    "https://wa.me/91" + phone +
    "?text=" + encodeURIComponent(text);

    window.open(url,"_blank");
}

</script>

</body>
</html>
